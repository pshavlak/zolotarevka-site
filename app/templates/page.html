{% extends "base.html" %}

{% block content %}
<section class="page-header">
    <div class="container page-header__inner">
        <h1 class="page-header__title">{{ page_title }}</h1>
    </div>
</section>

<div class="page-layout container">
    <div class="page-layout__content page-layout__content--full">
        {% if page_content %}
            {{ page_content|safe }}
        {% else %}
            <p>Содержимое страницы «{{ slug }}» будет добавлено.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
