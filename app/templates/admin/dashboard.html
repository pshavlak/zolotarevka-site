<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Страницы сайта — Админ-панель</title><link rel="stylesheet" href="/static/css/admin.css"></head>
<body><div class="admin-layout">
<aside class="admin-sidebar">
<div class="sidebar-header"><h1>Золотаревка</h1><span>Панель управления</span></div>
<nav class="sidebar-nav">
<a href="/admin/" class="nav-item active"><span class="icon">🗺️</span><span>Страницы сайта</span></a>
<a href="/admin/menu" class="nav-item"><span class="icon">📋</span><span>Меню</span></a>
<a href="/admin/media" class="nav-item"><span class="icon">🖼️</span><span>Медиа-центр</span></a>
<a href="/admin/settings-page" class="nav-item"><span class="icon">⚙️</span><span>Настройки</span></a>
<a href="/admin/roles-page" class="nav-item"><span class="icon">👥</span><span>Пользователи и роли</span></a>
</nav>
<div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);"><a href="/" class="nav-item" style="font-size:13px;" target="_blank"><span class="icon">↗️</span><span>Открыть сайт</span></a></div>
</aside>
<main class="admin-main">
<div class="page-header"><div><h2>Страницы сайта</h2><div class="subtitle">Управление контентом страниц</div></div>
<button class="btn btn-primary" onclick="openPageForm(null)">+ Новая страница</button></div>
<div class="card"><div class="card-header"><h3>Все страницы</h3></div><div class="card-body" id="pages-list"><div class="loading-state"><p>Загрузка...</p></div></div></div>
</main></div>

<div class="modal-overlay" id="page-form-modal">
<div class="modal"><div class="modal-header"><h3 id="modal-title">Новая страница</h3><button class="modal-close" onclick="closePageForm()">X</button></div>
<form id="page-form" onsubmit="submitPage(event)">
<div class="modal-body">
<div class="form-group"><label class="form-label">Название</label><input class="form-input" type="text" id="f-title" required></div>
<div class="form-group"><label class="form-label">URL (slug)</label><input class="form-input" type="text" id="f-slug"></div>
<div class="form-group"><label class="form-label">Содержимое (HTML)</label><textarea class="form-input" id="f-content" rows="10" style="font-family:monospace;font-size:13px;"></textarea></div>
<label class="form-checkbox"><input type="checkbox" id="f-pub" checked> Опубликовано</label>
</div>
<div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closePageForm()">Отмена</button><button type="submit" class="btn btn-primary" id="f-submit">Сохранить</button></div>
</form></div></div>

<div class="modal-overlay" id="del-modal">
<div class="modal modal-sm"><div class="modal-header"><h3>Подтверждение</h3><button class="modal-close" onclick="cancelDel()">X</button></div>
<div class="modal-body"><p>Удалить страницу <strong id="del-name"></strong>?</p></div>
<div class="modal-footer"><button class="btn btn-secondary" onclick="cancelDel()">Отмена</button><button class="btn btn-danger" onclick="execDel()">Удалить</button></div>
</div></div>

<div class="toast-container" id="toast-container"></div>
<script>
var PAGES=[], DEL_ID=null;
function T(m,t){var c=document.getElementById('toast-container'),e=document.createElement('div');e.className='toast toast-'+(t||'success');e.textContent=m;c.appendChild(e);setTimeout(function(){e.remove();},3000);}
function API(method,path,body){return fetch('/api/pages'+path,{method:method,headers:{'Content-Type':'application/json'},credentials:'include',body:body?JSON.stringify(body):null}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.detail||'Error');});return r.status===204?null:r.json();});}
function load(){API('GET','').then(function(d){PAGES=d;var el=document.getElementById('pages-list');if(!PAGES||PAGES.length===0){el.innerHTML='<div class=\"empty-state\"><div class=\"icon\">📄</div><h3>Нет страниц</h3><p>Создайте первую страницу.</p><button class=\"btn btn-primary\" onclick=\"openPageForm(null)\">+ Новая страница</button></div>';return;}
var h='<table style=\"width:100%;border-collapse:collapse;\"><tr style=\"text-align:left;border-bottom:2px solid #e5e7eb;\"><th style=\"padding:8px 4px;\">Название</th><th style=\"padding:8px 4px;\">URL</th><th style=\"padding:8px 4px;width:80px;\">Статус</th><th style=\"padding:8px 4px;width:100px;\">Действия</th></tr>';
for(var i=0;i<PAGES.length;i++){var p=PAGES[i];h+='<tr style=\"border-bottom:1px solid #e5e7eb;\"><td style=\"padding:10px 4px;\"><strong>'+esc(p.title)+'</strong><br><span style=\"font-size:12px;color:#6b7280;\">'+(p.content||'').substring(0,80)+'...</span></td><td style=\"padding:10px 4px;color:#3b82f6;\">/'+p.slug+'</td><td style=\"padding:10px 4px;\">'+(p.is_published?'Опубликовано':'Черновик')+'</td><td style=\"padding:10px 4px;\"><button class=\"btn btn-sm\" onclick=\"editPage('+p.id+')\" title=\"Редактировать\">✏️</button> <button class=\"btn btn-sm btn-danger\" onclick=\"askDel('+p.id+',\\''+esc(p.title)+'\\')\" title=\"Удалить\">🗑️</button></td></tr>';}
h+='</table>';el.innerHTML=h;}).catch(function(e){document.getElementById('pages-list').innerHTML='<div class=\"empty-state\"><div class=\"icon\">⚠️</div><h3>Ошибка загрузки</h3><p>'+e.message+'</p></div>';});}
function esc(s){return s.replace(/'/g,"\\'").replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openPageForm(p){document.getElementById('page-form-modal').classList.add('active');document.body.style.overflow='hidden';document.getElementById('form-page-id').value=p?p.id:'';document.getElementById('f-title').value=p?p.title:'';document.getElementById('f-slug').value=p?p.slug:'';document.getElementById('f-content').value=p?p.content||'':'';document.getElementById('f-pub').checked=p?p.is_published:true;document.getElementById('modal-title').textContent=p?'Редактировать страницу':'Новая страница';document.getElementById('f-submit').textContent=p?'Обновить':'Создать';}
function closePageForm(){document.getElementById('page-form-modal').classList.remove('active');document.body.style.overflow='';}
function submitPage(e){e.preventDefault();var id=document.getElementById('form-page-id').value;var data={title:document.getElementById('f-title').value,slug:document.getElementById('f-slug').value||document.getElementById('f-title').value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''),content:document.getElementById('f-content').value,is_published:document.getElementById('f-pub').checked};var req=id?API('PUT','/'+id,data):API('POST','',data);req.then(function(){T(id?'Страница обновлена':'Страница создана');closePageForm();load();}).catch(function(e){T(e.message,'error');});}
function editPage(id){for(var i=0;i<PAGES.length;i++){if(PAGES[i].id===id){openPageForm(PAGES[i]);return;}}}
function askDel(id,t){document.getElementById('del-name').textContent=t;DEL_ID=id;document.getElementById('del-modal').classList.add('active');}
function cancelDel(){document.getElementById('del-modal').classList.remove('active');DEL_ID=null;}
function execDel(){API('DELETE','/'+DEL_ID).then(function(){T('Страница удалена');cancelDel();load();}).catch(function(e){T(e.message,'error');});}
load();
</script>
</body></html>
