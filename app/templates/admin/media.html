<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Медиа-центр — Админ-панель</title><link rel="stylesheet" href="/static/css/admin.css"></head><body><div class="admin-layout"><aside class="admin-sidebar"><div class="sidebar-header"><h1>Золотаревка</h1><span>Панель управления</span></div><nav class="sidebar-nav"><a href="/admin/" class="nav-item"><span class="icon">🗺️</span><span>Страницы сайта</span></a><a href="/admin/menu" class="nav-item"><span class="icon">📋</span><span>Меню</span></a><a href="/admin/media" class="nav-item active"><span class="icon">🖼️</span><span>Медиа-центр</span></a><a href="/admin/content" class="nav-item"><span class="icon">📰</span><span>Контент</span></a><a href="/admin/settings-page" class="nav-item"><span class="icon">⚙️</span><span>Настройки</span></a><a href="/admin/roles-page" class="nav-item"><span class="icon">👥</span><span>Пользователи и роли</span></a></nav><div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);"><a href="/" class="nav-item" style="font-size:13px;" target="_blank"><span class="icon">↗️</span><span>Открыть сайт</span></a></div></aside><main class="admin-main"><div class="page-header"><div><h2>🖼️ Медиа-центр</h2><div class="subtitle">Загрузка и управление файлами</div></div></div><div class="card"><div class="card-header"><h3>Загруженные файлы</h3></div><div class="card-body" id="media-list"><div class="loading-state"><p>⏳ Загрузка…</p></div></div></div></main></div><div class="toast-container" id="toast-container"></div><script>
async function loadMedia(){try{const r=await fetch('/api/media',{credentials:'include'});if(!r.ok)throw new Error('Auth');const items=await r.json();const el=document.getElementById('media-list');if(items.length===0){el.innerHTML='<div class="empty-state"><div class="icon">🖼️</div><h3>Нет файлов</h3><p>Загрузите изображения или документы.</p></div>';return}
el.innerHTML='<table style="width:100%;border-collapse:collapse;"><tr style="text-align:left;border-bottom:2px solid var(--border);"><th style="padding:8px 4px;">Файл</th><th style="padding:8px 4px;">Размер</th><th style="padding:8px 4px;">Тип</th><th style="padding:8px 4px;">Дата</th></tr>'+items.map(i=>'<tr style="border-bottom:1px solid var(--border);"><td style="padding:10px 4px;">'+i.original_name+'</td><td style="padding:10px 4px;">'+(i.size_bytes/1024).toFixed(1)+' KB</td><td style="padding:10px 4px;">'+i.mime_type+'</td><td style="padding:10px 4px;">'+i.created_at.slice(0,10)+'</td></tr>').join('')+'</table>'}catch(e){document.getElementById('media-list').innerHTML='<div class="empty-state"><div class="icon">⚠️</div><h3>Ошибка</h3><p>'+e.message+'</p></div>'}
}
loadMedia();
</script></body></html>
